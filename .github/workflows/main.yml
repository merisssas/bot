name: Fix Repo Links
on: workflow_dispatch

permissions:
  contents: write  # Izin standar untuk edit file biasa

jobs:
  replace-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Replace Text (Skip .github folder)
        run: |
          # Kita exclude folder .git DAN .github agar tidak kena block permission
          grep -rli 'github.com/krau/SaveAny-Bot' . --exclude-dir={.git,.github} | xargs -I {} sed -i 's|github.com/krau/SaveAny-Bot|github.com/merisssas/bot|g' {}
          
      - name: Verify Changes
        run: git status

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add .
          # Commit hanya jika ada perubahan
          git diff-index --quiet HEAD || git commit -m "chore: update repo links everywhere except workflows"
          git push
